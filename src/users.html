<!--This class was created with Generative AI-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/login.css" />
    <!-- for bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>EcoScan — All Users</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  </head>
  <body class="app-page">

    <header class="app-header grid">
      <a href="login.html" class="app-logo">
        <div class="logo-icon">♻️</div>
        <span>EcoScan</span>
      </a>
      <nav class="app-nav">
        <a href="history.html" class="nav-icon-btn" data-tooltip="My History">
          <span class="icon-wrap">
            <i class="bi bi-clock-fill"></i>
            <span class="nav-text">My History</span>
          </span>
        </a>
        <a href="users.html" class="nav-icon-btn" data-tooltip="All Users" style="color:var(--accent);">
          <span class="icon-wrap">
            <i class="bi bi-globe-asia-australia"></i>
            <span class="nav-text-active">All Users</span>
          </span>
        </a>
        <a href="../index.html" class="nav-icon-btn" data-tooltip="Scan">
          <span class="icon-wrap">
            <i class="bi bi-camera-fill"></i>
            <span class="nav-text">Scan</span>
          </span>
        </a>
      </nav>
      <div class="app-header-right">
        <div class="user-pill">
          <div class="user-avatar" id="header-avatar">?</div>
          <span class="user-name" id="header-name">Loading…</span>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-in-right"></i></button>
      </div>
    </header>

    <div class="page-content">

      <div class="page-header">
        <div class="page-title-wrap">
          <p class="page-eyebrow">Community Overview</p></i>
          <h1 class="page-title">All <span>Users & Stats</span></h1>
          <h1>Carbon Emission Saved: <span id="carbonemissionsaved">0</span> grams</h1>
          
        </div>
      </div>

      <div class="stats-row grid" id="overall-stats"></div>
      <div class="users-grid grid" id="users-grid"></div>

      <div class="charts-grid grid">
        <div class="chart-card wide">
          <h3> <i class="bi bi-bar-chart-line-fill"></i> Total Items Scanned per City</h3>
          <div class="chart-canvas-wrap">
            <canvas id="chart-per-user"></canvas>
          </div>
        </div>
        <div class="chart-card narrow">
          <h3><i class="bi bi-pie-chart-fill"></i>Item Type Breakdown</h3>
          <div class="chart-canvas-wrap">
            <canvas id="chart-item-types"></canvas>
          </div>
        </div>
        <div class="chart-card full">
          <h3><i class="bi bi-sort-up-alt"></i>Cumulative Scans Over Time</h3>
          <div class="chart-canvas-wrap">
            <canvas id="chart-over-time"></canvas>
          </div>
        </div>
      </div>

    </div>

    <script src="../js/users.js"></script>
    <script>

    const savedCarbon = sessionStorage.getItem("carbonEmissionSaved") || 0;
    document.getElementById("carbonemissionsaved").textContent = savedCarbon;

      const me = requireAuth();
      if (!me) throw new Error("Not authenticated");

      document.getElementById("header-name").textContent   = me.displayName;
      document.getElementById("header-avatar").textContent = me.displayName.charAt(0);

      const users = getAllUsers();

      const AVATAR_COLORS = ["#2d6a4f","#52b788","#1a3c2e","#74c69d","#40916c"];
      const CHART_COLORS  = {
        "Plastic Bottle":  "#52b788",
        "Paper Cup":       "#7db094",
        "Snack Wrapper":  "#2b6148",
        "Paper Container": "#b7e4c7",
        "Napkin":      "#1a3c2e",
      };

      const totalScans = users.reduce((s, u) => s + u.history.length, 0);
      const topUser    = [...users].sort((a,b) => b.history.length - a.history.length)[0];
      const allItemCounts = {};
      users.forEach(u => u.history.forEach(h => {
        allItemCounts[h.item] = (allItemCounts[h.item] || 0) + 1;
      }));
      const topType = Object.entries(allItemCounts).sort((a,b)=>b[1]-a[1])[0];

      document.getElementById("overall-stats").innerHTML = `
        <div class="stat-card">
          <div><i class="bi bi-people-fill" style="color: var(--green-light);"></i></div>
          <div class="sc-value">${users.length}</div>
          <div class="sc-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div><i class="bi bi-upc-scan" style="color: var(--green-light);"></i></div>
          <div class="sc-value">${totalScans}</div>
          <div class="sc-label">Total Scans</div>
        </div>
        <div class="stat-card">
          <div><i class="bi bi-trophy-fill" style="color: var(--green-light);"></i></div>
          <div class="sc-value">${topUser.displayName.split(" ")[0]}</div>
          <div class="sc-label">Top Scanner (${topUser.history.length} items)</div>
        </div>
        <div class="stat-card">
          <div><i class="bi bi-trash3-fill" style="color: var(--green-light);"></i></div>
          <div class="sc-value">${topType ? topType[1] : 0}</div>
          <div class="sc-label">Most Common: ${topType ? topType[0] : "—"}</div>
        </div>
      `;

      const usersGrid = document.getElementById("users-grid");
      users.forEach((u, i) => {
        const c   = getItemCounts(u);
        const top = Object.entries(c).sort((a,b)=>b[1]-a[1])[0];
        const card = document.createElement("div");
        card.className = "user-card";
        card.innerHTML = `
          <div class="user-card-top">
            <div class="uc-avatar" style="background:${AVATAR_COLORS[i % AVATAR_COLORS.length]}">
              ${u.displayName.charAt(0)}
            </div>
            <div class="uc-info">
              <h4>${u.displayName}</h4>
              <p><i class="bi bi-geo-fill"></i>${u.city} · Joined ${new Date(u.joinDate)
                .toLocaleDateString("en-PH",{month:"short",year:"numeric"})}</p>
            </div>
          </div>
          <div class="uc-stats">
            <div class="uc-stat">
              <div class="uc-stat-val">${u.history.length}</div>
              <div class="uc-stat-lbl">Total Scans</div>
            </div>
            <div class="uc-stat">
              <div class="uc-stat-val">${Object.keys(c).length}</div>
              <div class="uc-stat-lbl">Item Types</div>
            </div>
          </div>
          ${top ? `<p style="font-size:13px;color:var(--muted);margin-top:14px;">
            Top item: <strong style="color:var(--green-mid)">${top[0]}</strong> (${top[1]}×)
          </p>` : ""}
        `;
        usersGrid.appendChild(card);
      });

      const defaultOpts = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { font: { family: "'DM Sans'" }, color: "#1a3c2e" } } },
      };

      new Chart(document.getElementById("chart-per-user"), {
            type: "bar",
            data: {
            labels: users.map(u => u.city),          datasets: [{
            label: "Items Scanned",
            data:  users.map(u => u.history.length),
            backgroundColor: users.map((_, i) => AVATAR_COLORS[i % AVATAR_COLORS.length]),
            borderRadius: 8,
            borderSkipped: false,
          }],
        },
        options: {
          ...defaultOpts,
          scales: {
            y: { beginAtZero: true, ticks: { color: "#5a6a60" }, grid: { color: "rgba(82,183,136,0.1)" } },
            x: { ticks: { color: "#5a6a60" }, grid: { display: false } },
          },
          plugins: { ...defaultOpts.plugins, legend: { display: false } },
        },
      });

      new Chart(document.getElementById("chart-item-types"), {
        type: "doughnut",
        data: {
          labels: Object.keys(allItemCounts),
          datasets: [{
            data: Object.values(allItemCounts),
            backgroundColor: Object.keys(allItemCounts).map(k => CHART_COLORS[k] || "#74c69d"),
            borderWidth: 2,
            borderColor: "#f8f5ee",
          }],
        },
        options: { ...defaultOpts, cutout: "65%" },
      });

      const dateSet = new Set();
      users.forEach(u => u.history.forEach(h => dateSet.add(h.date)));
      const sortedDates = [...dateSet].sort();

      const lineDatasets = users.map((u, i) => {
        let running = 0;
        return {
          label: u.displayName,
          data: sortedDates.map(d => {
            running += u.history.filter(h => h.date === d).length;
            return running;
          }),
          borderColor: AVATAR_COLORS[i % AVATAR_COLORS.length],
          backgroundColor: "transparent",
          tension: 0.4,
          pointRadius: 4,
          pointBackgroundColor: AVATAR_COLORS[i % AVATAR_COLORS.length],
        };
      });

      new Chart(document.getElementById("chart-over-time"), {
        type: "line",
        data: {
          labels: sortedDates.map(d =>
            new Date(d).toLocaleDateString("en-PH", { month: "short", day: "numeric" })
          ),
          datasets: lineDatasets,
        },
        options: {
          ...defaultOpts,
          scales: {
            y: { beginAtZero: true, ticks: { color: "#5a6a60" }, grid: { color: "rgba(82,183,136,0.1)" } },
            x: { ticks: { color: "#5a6a60" }, grid: { display: false } },
          },
        },
      });
    </script>
  </body>
</html>
