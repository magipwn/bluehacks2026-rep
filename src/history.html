<!--This class was created with Generative AI-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/login.css" />
    <!-- for bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>EcoScan — My History</title>
  </head>
  <body class="app-page">

    <header class="app-header grid">
      <a href="login.html" class="app-logo">
        <div class="logo-icon">♻️</div>
        <span>EcoScan</span>
      </a>
      <nav class="app-nav">
        <a href="history.html" class="nav-icon-btn" data-tooltip="My History" style="color:var(--accent);">
          <span class="icon-wrap">
            <i class="bi bi-clock-fill"></i>
            <span class="nav-text-active">My History</span>
          </span>
        </a>
        <a href="users.html" class="nav-icon-btn" data-tooltip="All Users">
          <span class="icon-wrap">
            <i class="bi bi-globe-asia-australia"></i>
            <span class="nav-text">All Users</span>
          </span>
        </a>
        <a href="../index.html" class="nav-icon-btn" data-tooltip="Scan">
          <span class="icon-wrap">
            <i class="bi bi-camera-fill"></i>
            <span class="nav-text">Scan</span>
          </span>
        </a>
      </nav>
      <div class="app-header-right">
        <div class="user-pill">
          <div class="user-avatar" id="header-avatar">?</div>
          <span class="user-name" id="header-name">Loading…</span>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-in-right"></i></button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div class="page-title-wrap">
          <p class="page-eyebrow">Personal Dashboard</p>
          <h1 class="page-title" id="page-title">My <span>Scan History</span></h1>
        </div>
      </div>

      <div class="stats-row grid" id="stats-row"></div>

      <div class="table-card">
        <div class="table-card-header">
          <h3>All Scanned Items</h3>
          <span class="badge" id="total-badge">0 items</span>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Date</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>

    <script src="../js/users.js"></script>
    <script>
      const user = requireAuth();
      if (!user) throw new Error("Not authenticated");

      document.getElementById("header-name").textContent   = user.displayName;
      document.getElementById("header-avatar").textContent = user.displayName.charAt(0);
      document.getElementById("page-title").innerHTML =
        `<span>${user.displayName.split(" ")[0]}'s</span> Scan History`;

      const counts  = getItemCounts(user);
      const total   = user.history.length;
      const topItem = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];

      const ICONS = {
        "Plastic Bottle":  "🍶",
        "Cardboard":       "📦",
        "Paper Cup":       "☕",
        "Snack Wrapper":  "🍟",
        "Paper Container": "🗂️",
        "Food Waste":      "🍌",
      };

      document.getElementById("stats-row").innerHTML = `
        <div class="stat-card">
          <div><i class="bi bi-basket2-fill" style="color: var(--green-light);"></i></div>
          <div class="sc-value">${total}</div>
          <div class="sc-label">Total Items Scanned</div>
        </div>
        <div class="stat-card">
          <div class="sc-icon">${topItem ? ICONS[topItem[0]] || "♻️" : "—"}</div>
          <div class="sc-value">${topItem ? topItem[1] : 0}</div>
          <div class="sc-label">Most Scanned: ${topItem ? topItem[0] : "—"}</div>
        </div>
        <div class="stat-card">
          <div><i class="bi bi-box-seam-fill" style="color: var(--green-light);"></i></div>
          <div class="sc-value">${Object.keys(counts).length}</div>
          <div class="sc-label">Item Types Found</div>
        </div>
        <div class="stat-card">
          <div><i class="bi bi-calendar2-week-fill" style="color: var(--green-light);"></i></div>
          <div class="sc-value">${user.history.length > 0
            ? new Date(user.history[user.history.length - 1].date)
                .toLocaleDateString("en-PH", { month: "short", day: "numeric" })
            : "—"}</div>
          <div class="sc-label">Last Scan</div>
        </div>
      `;

      document.getElementById("total-badge").textContent = `${total} item${total !== 1 ? "s" : ""}`;

      const tbody = document.getElementById("history-body");
      if (user.history.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--muted);">
          No items scanned yet. Start scanning! 🌱</td></tr>`;
      } else {
        [...user.history].reverse().forEach(entry => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><span class="item-chip">${entry.emoji} ${entry.item}</span></td>
            <td>${new Date(entry.date).toLocaleDateString("en-PH",
                  { year: "numeric", month: "short", day: "numeric" })}</td>
            <td>${entry.time}</td>
          `;
          tbody.appendChild(tr);
        });
      }
    </script>
  </body>
</html>
